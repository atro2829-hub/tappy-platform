name: Build Admin Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-admin/**'
      - '.github/workflows/build-android-admin-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Admin APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-admin-${{ hashFiles('android-admin/**/*.gradle*', 'android-admin/**/gradle-wrapper.properties') }}
          restore-keys: gradle-admin-

      - name: Decode keystore
        working-directory: android-admin
        run: |
          echo "${{ secrets.ANDROID_ADMIN_KEYSTORE }}" | base64 -d > tappy-admin.jks
          printf 'storeFile=tappy-admin.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            "${{ secrets.ANDROID_ADMIN_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_ADMIN_KEY_PASSWORD }}" > keystore.properties

      - name: Grant execute permission for gradlew
        working-directory: android-admin
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: android-admin
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK
        working-directory: android-admin
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          ls -lh "$APK_PATH"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$APK_PATH" || true

      - name: Rename APK
        working-directory: android-admin
        run: |
          mkdir -p outputs
          cp app/build/outputs/apk/release/app-release.apk outputs/tappy-admin-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tappy-admin-apk
          path: android-admin/outputs/tappy-admin-v1.0.0.apk
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: admin-v1.0.0-${{ github.run_number }}
          name: Tappy Admin App v1.0.0
          body: |
            # Tappy Admin App v1.0.0

            تطبيق الإدارة Tappy Admin - WebView native Android app
            - Admin dashboard with audit logs, KYC, risk management
            - Commission rules and catalog management
            - Signed release APK
          files: android-admin/outputs/tappy-admin-v1.0.0.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
