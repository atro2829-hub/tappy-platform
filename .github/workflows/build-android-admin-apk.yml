name: Build Admin Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android-admin/**'
      - '.github/workflows/build-android-admin-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Build
        working-directory: android-admin
        env:
          KS_B64: ${{ secrets.ANDROID_ADMIN_KEYSTORE }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_ADMIN_KEY_ALIAS }}
          KS_KEYPASS: ${{ secrets.ANDROID_ADMIN_KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > tappy-admin.jks
          printf 'storeFile=tappy-admin.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$KS_PASS" "$KS_ALIAS" "$KS_KEYPASS" > keystore.properties
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          mkdir -p outputs && cp app/build/outputs/apk/release/app-release.apk outputs/tappy-admin.apk
      - uses: actions/upload-artifact@v4
        with:
          name: tappy-admin-apk
          path: android-admin/outputs/tappy-admin.apk
