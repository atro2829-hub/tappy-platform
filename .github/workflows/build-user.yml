name: Build User App

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/Http/Controllers/**'
      - 'resources/js/pages/**'
      - '!resources/js/pages/admin/**'
      - '.github/workflows/build-user.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'app/Http/Controllers/**'
      - 'resources/js/pages/**'
      - '!resources/js/pages/admin/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "user-build"
  cancel-in-progress: false

jobs:
  build:
    name: Build User Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pdo, pdo_pgsql, pgsql, openssl
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form

      - name: Build user assets
        run: npm run build
        env:
          VITE_BUILD_TARGET: user

      - name: Upload user artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-dist
          path: public/build

  test:
    name: Test User Endpoints
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tappy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pdo, pdo_pgsql, pgsql, openssl
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          sed -i 's|DB_CONNECTION=.*|DB_CONNECTION=pgsql|' .env
          sed -i 's|DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|DB_PORT=.*|DB_PORT=5432|' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=tappy_test|' .env
          sed -i 's|DB_USERNAME=.*|DB_USERNAME=postgres|' .env
          sed -i 's|DB_PASSWORD=.*|DB_PASSWORD=postgres|' .env
          sed -i 's|DB_SSLMODE=.*|DB_SSLMODE=prefer|' .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run user tests
        run: php artisan test --filter=User

  deploy:
    name: Deploy User App
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: user-dist
          path: dist

      - name: Deploy to production
        run: |
          echo "Deploying user app to production..."
          # Add deployment logic here (Vercel, Netlify, custom server, etc.)
          ls -la dist/
