name: Build User Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v4
      - name: Install deps
        working-directory: android-user
        run: npm ci
      - name: Build web
        working-directory: android-user
        run: npm run build
      - name: Sync
        working-directory: android-user
        run: npx cap sync android
      - name: Build APK
        working-directory: android-user/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          mkdir -p ../outputs
          cp app/build/outputs/apk/debug/app-debug.apk ../outputs/tappy-user-debug.apk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tappy-user-apk
          path: android-user/outputs/tappy-user-debug.apk
          retention-days: 90
