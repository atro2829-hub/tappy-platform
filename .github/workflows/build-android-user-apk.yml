name: Build User Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android-user/**'
      - '.github/workflows/build-android-user-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Decode keystore
        working-directory: android-user
        env:
          KS_B64: ${{ secrets.ANDROID_USER_KEYSTORE }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_USER_KEY_ALIAS }}
          KS_KEYPASS: ${{ secrets.ANDROID_USER_KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > tappy-user.jks
          printf 'storeFile=tappy-user.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$KS_PASS" "$KS_ALIAS" "$KS_KEYPASS" > keystore.properties

      - name: Build APK
        working-directory: android-user
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          mkdir -p outputs
          cp app/build/outputs/apk/release/app-release.apk outputs/tappy-user.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tappy-user-apk
          path: android-user/outputs/tappy-user.apk
