name: Build User Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-user/**'
      - '.github/workflows/build-android-user-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Signed User APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-user-${{ hashFiles('android-user/**/*.gradle*', 'android-user/**/gradle-wrapper.properties') }}
          restore-keys: gradle-user-

      - name: Decode keystore
        working-directory: android-user
        run: |
          echo "${{ secrets.ANDROID_USER_KEYSTORE }}" | base64 -d > tappy-user.jks
          printf 'storeFile=tappy-user.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            "${{ secrets.ANDROID_USER_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_USER_KEY_PASSWORD }}" > keystore.properties

      - name: Grant execute permission for gradlew
        working-directory: android-user
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: android-user
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK
        working-directory: android-user
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          ls -lh "$APK_PATH"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$APK_PATH" || true

      - name: Rename APK
        working-directory: android-user
        run: |
          mkdir -p outputs
          cp app/build/outputs/apk/release/app-release.apk outputs/tappy-user-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tappy-user-apk
          path: android-user/outputs/tappy-user-v1.0.0.apk
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: user-v1.0.0-${{ github.run_number }}
          name: Tappy User App v1.0.0
          body: |
            # Tappy User App v1.0.0

            تطبيق المستخدم Tappy - WebView native Android app
            - Multi-currency wallet (YER, SAR, USD)
            - Global top-ups and gift cards
            - Signed release APK
          files: android-user/outputs/tappy-user-v1.0.0.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
